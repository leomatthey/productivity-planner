services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - db-data:/app/data
    env_file:
      - ./backend/.env
    environment:
      - TZ=${TZ:-Europe/Madrid}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  db-data:
